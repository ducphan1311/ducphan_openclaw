# OpenClaw Security & Plugin Policies (Native macOS Setup)
# Enforces the 8 strict security constraints for native execution

agents:
  defaults:
    model: google/gemini-2.5-flash
    provider: google
  main:
    model: google/gemini-2.5-flash
    provider: google

models:
  default: google/gemini-2.5-flash
  providers:
    google:
      models:
        - id: gemini-2.5-flash

security:
  # 1. Workspace Limit
  workspace:
    restrict_to_dir: "/Users/ducphan/Documents/trae_projects/openclaw_manager"
    deny_access:
      - "/Users/ducphan"       # Home dir
      - "/System"
      - "/Library"
      - "/var"
      - "/etc"

  # 2. Secrets Hygiene
  secrets:
    enforce_vault: true
    enforce_chmod_600: true
    deny_env_exposure: true

  # 3. Approval Gate (HITL - Human in the loop)
  hitl:
    destructive_actions: true   # Deletes, formats, system modifications
    deployments: true           # App store uploads, pushing to production
    file_deletion: true
    system_commands: true
    external_api_modifications: true
    browser_form_submit: true    # Forms that alter remote state
    email_send: true             # Any outbound email
    messaging_outbound: true     # Telegram/Messenger/Zalo/Teams outbound messages
    payments_checkout: true      # Shopping checkout, subscriptions, bookings
    travel_booking: true         # Flight/hotel booking, check-in, passenger changes
    git_push: true
    vm_execution: true          # Requires approval to start/stop VMs or Emulators

  # 4. Git Checkpoint & 7. CI Safety
  git:
    enforce_bot_branch: true    # Agent must work on feature branches
    require_human_merge_to_main: true
    auto_rollback_on_test_failure: true
    pre_commit_tests: true

  # 5. Network Policy
  network:
    allowlist_domains:
      - "*.atlassian.net"
      - "graph.microsoft.com"
      - "*.microsoftonline.com"
      - "*.microsoft.com"
      - "*.live.com"
      - "*.office.com"
      - "*.msauth.net"
      - "*.msftauth.net"
      - "teams.microsoft.com"
      - "*.teams.microsoft.com"
      - "*.skype.com"
      - "dev.azure.com"
      - "*.visualstudio.com"
      - "figma.com"
      - "*.figma.com"
      - "api.telegram.org"
      - "reddit.com"
      - "voz.vn"
      - "x.com"
      - "twitter.com"
      - "github.com"            # Added for CI/Clone
      - "raw.githubusercontent.com"
      - "dl.google.com"         # Added for Android Studio/SDK
      - "storage.googleapis.com"# Added for Flutter SDK
      - "pub.dev"               # Added for Flutter Packages
      - "accounts.google.com"
      - "oauth2.googleapis.com"
      - "www.googleapis.com"
      - "gmail.googleapis.com"
      - "imap.gmail.com"
      - "smtp.gmail.com"
      - "api.browseract.com"
      - "browseract.com"
      - "*.browseract.com"
      - "api.apify.com"
      - "*.apify.com"
      - "api.amadeus.com"
      - "test.api.amadeus.com"
      - "*.amadeus.com"
      - "amazon.com"
      - "*.amazon.com"
      - "camelcamelcamel.com"
      - "*.camelcamelcamel.com"
    block_local_network_access: false

  # 8. Observability
  observability:
    log_level: "debug"
    warn_on_dangerous_commands: true
    audit_trail: true

plugins:
  allow_unsigned_skills: false
  trusted_skills_dir: "/Users/ducphan/Documents/trae_projects/openclaw_manager/skills"
  
  # 6. Tool Policy
  tools:
    shell_command:
      blocked_commands:
        - "rm -rf /"
        - "mkfs"
        - "chmod -R 777"
        - "chown -R"
        - "sudo"
        - "su"
        - "env"
        - "printenv"
        - "export"
        - "echo $OPENAI_API_KEY"
        - "echo $ANTHROPIC_API_KEY"
        - "curl | bash"
        - "curl | sh"
        - "wget | bash"
        - "wget | sh"
        - "security find-generic-password"
        - "security dump-keychain"
      max_execution_time_seconds: 120

    browser_automation:
      sandbox: true
      disable_javascript: false
      block_ads: true
      restrict_web_fetch: false  # Allow browser tool to navigate and fetch public web pages
      require_approval_for_submit: true
      require_approval_for_checkout: true
      forbid_captcha_bypass: true
      forbid_credential_extraction: true
